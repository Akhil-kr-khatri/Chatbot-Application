jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        working-directory: ai-backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build \
            -t akhilkhatri/ai-chatbot-backend:latest \
            -t akhilkhatri/ai-chatbot-backend:${{ github.sha }} \
            ./ai-backend

      - run: docker push akhilkhatri/ai-chatbot-backend:latest

      - run: docker push akhilkhatri/ai-chatbot-backend:${{ github.sha }}