name: Build and Push Backend Docker Image

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  docker:

    runs-on: ubuntu-latest

    steps:

      # Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Install Dependencies
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build Docker Image
      - name: Build Docker Image
        run: |
          docker build \
            -t akhilkhatri/ai-chatbot-backend:latest \
            -t akhilkhatri/ai-chatbot-backend:${{ github.sha }} \
            .

      # Push Latest Image
      - name: Push Latest Image
        run: docker push akhilkhatri/ai-chatbot-backend:latest

      # Push Versioned Image
      - name: Push Versioned Image
        run: docker push akhilkhatri/ai-chatbot-backend:${{ github.sha }}

      # Display Image Information
      - name: Image Details
        run: |
          echo "==============================================="
          echo "Backend Docker Image Published Successfully"
          echo "Latest Tag : akhilkhatri/ai-chatbot-backend:latest"
          echo "Version Tag: akhilkhatri/ai-chatbot-backend:${{ github.sha }}"
          echo "==============================================="