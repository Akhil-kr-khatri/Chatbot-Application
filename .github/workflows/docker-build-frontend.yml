jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        working-directory: ai-chat-app
        run: npm ci

      - name: Build React
        working-directory: ai-chat-app
        run: npm run build

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build \
            -t akhilkhatri/ai-chatbot-frontend:latest \
            -t akhilkhatri/ai-chatbot-frontend:${{ github.sha }} \
            ./ai-chat-app

      - run: docker push akhilkhatri/ai-chatbot-frontend:latest

      - run: docker push akhilkhatri/ai-chatbot-frontend:${{ github.sha }}

      