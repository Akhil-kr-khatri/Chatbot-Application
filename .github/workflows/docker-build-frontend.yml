name: Build and Push Frontend Docker Image

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  docker:

    runs-on: ubuntu-latest

    steps:

      # Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Install Dependencies
      - name: Install Dependencies
        run: npm ci

      # Build React Application
      - name: Build Application
        run: npm run build

      # Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build Docker Image
      - name: Build Docker Image
        run: |
          docker build \
            -t akhilkhatri/ai-chatbot-frontend:latest \
            -t akhilkhatri/ai-chatbot-frontend:${{ github.sha }} \
            .

      # Push Latest Image
      - name: Push Latest Image
        run: docker push akhilkhatri/ai-chatbot-frontend:latest

      # Push Versioned Image
      - name: Push Versioned Image
        run: docker push akhilkhatri/ai-chatbot-frontend:${{ github.sha }}

      # Display Image Information
      - name: Image Details
        run: |
          echo "==============================================="
          echo "Frontend Docker Image Successfully Published"
          echo "Latest Tag : akhilkhatri/ai-chatbot-frontend:latest"
          echo "Version Tag: akhilkhatri/ai-chatbot-frontend:${{ github.sha }}"
          echo "==============================================="